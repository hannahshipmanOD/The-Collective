name: Superdojo Sync

on:
  schedule:
    - cron: '3 15 * * 1'
  workflow_dispatch:

jobs:
  superdojo-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout The-Collective
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUPERDOJO_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Superdojo sync
        env:
          SUPERDOJO_TOKEN: ${{ secrets.SUPERDOJO_TOKEN }}
        run: python3 scripts/sync-superdojo.py

      - name: Open PR if changes detected
        env:
          GH_TOKEN: ${{ secrets.SUPERDOJO_TOKEN }}
        run: |
          if git diff --quiet HEAD; then
            echo "No changes detected. Nothing to PR."
            exit 0
          fi
          BRANCH="superdojo-sync-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add skills/
          git commit -m "chore: sync skill updates from opendoor-labs/superdojo $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          PR_BODY="Automated sync from opendoor-labs/superdojo. Review the diff and merge to pull in the latest skill updates."
          gh pr create --title "Superdojo skill updates $(date +%Y-%m-%d)" --body "$PR_BODY" --base main --head "$BRANCH"
