name: REIT Flip Alert

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 8am PT (PDT), weekdays only
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  reit-flip-alert:
    runs-on: runner-sm-ng
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install snowflake-connector-python slack_sdk

      - name: Configure Snowflake
        env:
          SF_USER: ${{ secrets.SNOWFLAKE_USER }}
          SF_PASS: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/connections.toml << EOF
          [default]
          account = "RW35960-OPENDOOR"
          user = "${SF_USER}"
          password = "${SF_PASS}"
          authenticator = "snowflake"
          role = "DWH_ODL_DATA_USER"
          warehouse = "INTERACTIVE_WH"
          database = "DWH"
          EOF
          chmod 0600 ~/.snowflake/connections.toml

      - name: Run REIT flip alert
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python3 scripts/query-reit-flip-alert.py
